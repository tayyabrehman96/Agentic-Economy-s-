<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" width="920" height="420" role="img" aria-labelledby="title desc">
  <title id="title">Agentic Economy  high-level architecture</title>
  <desc id="desc">Flow from users and agents through marketplace and SDK to indexer and smart contracts on Ethereum L2</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="920" height="420" fill="url(#bg)"/>
  <text x="460" y="36" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Agentic Economy  Architecture Overview</text>
  <!-- Top: participants -->
  <g font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#334155">
    <rect x="60" y="70" width="160" height="72" rx="8" fill="#fff" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="140" y="100" text-anchor="middle" font-weight="600">Users &amp; builders</text>
    <text x="140" y="122" text-anchor="middle" font-size="11" fill="#64748b">dapps, wallets, ops</text>
    <rect x="380" y="70" width="160" height="72" rx="8" fill="#fff" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="460" y="100" text-anchor="middle" font-weight="600">Autonomous agents</text>
    <text x="460" y="122" text-anchor="middle" font-size="11" fill="#64748b">AI services, bots</text>
    <rect x="700" y="70" width="160" height="72" rx="8" fill="#fff" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="780" y="100" text-anchor="middle" font-weight="600">Counterparties</text>
    <text x="780" y="122" text-anchor="middle" font-size="11" fill="#64748b">hire, pay, rate</text>
  </g>
  <!-- Arrows down -->
  <path d="M140 142 L140 168 M130 160 L140 170 L150 160" stroke="#475569" stroke-width="1.5" fill="none"/>
  <path d="M460 142 L460 168 M450 160 L460 170 L470 160" stroke="#475569" stroke-width="1.5" fill="none"/>
  <path d="M780 142 L780 168 M770 160 L780 170 L790 160" stroke="#475569" stroke-width="1.5" fill="none"/>
  <!-- Middle: Agentic Economy box -->
  <rect x="200" y="180" width="520" height="100" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="460" y="208" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="700" fill="#312e81">Agentic Economy (product layer)</text>
  <text x="280" y="240" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#4338ca">" Marketplace (list / discover)</text>
  <text x="280" y="260" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#4338ca">" SDK / API</text>
  <text x="530" y="240" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#4338ca">" Agent identity (wallet-linked)</text>
  <text x="530" y="260" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#4338ca">" Reputation signals</text>
  <!-- To indexer & chain -->
  <path d="M320 280 L320 308 M310 300 L320 310 L330 300" stroke="#475569" stroke-width="1.5" fill="none"/>
  <path d="M460 280 L460 308 M450 300 L460 310 L470 300" stroke="#475569" stroke-width="1.5" fill="none"/>
  <path d="M600 280 L600 308 M590 300 L600 310 L610 300" stroke="#475569" stroke-width="1.5" fill="none"/>
  <rect x="180" y="318" width="200" height="72" rx="8" fill="#fff" stroke="#0ea5e9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="280" y="348" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="600" fill="#0c4a6e">Indexer / metadata</text>
  <text x="280" y="372" text-anchor="middle" font-size="11" fill="#0369a1">search, events, off-chain UX</text>
  <rect x="540" y="318" width="200" height="72" rx="8" fill="#fff" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="640" y="346" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="600" fill="#581c87">Smart contracts</text>
  <text x="640" y="366" text-anchor="middle" font-size="11" fill="#7e22ce">registry · payments · escrow</text>
  <text x="640" y="382" text-anchor="middle" font-size="11" fill="#7e22ce">Ethereum (L2-ready)</text>
  <!-- Connector between indexer and contracts -->
  <path d="M380 354 L540 354" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3" fill="none"/>
  <text x="460" y="348" text-anchor="middle" font-size="10" fill="#64748b">indexes on-chain events</text>
</svg>
